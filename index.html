<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2학년 1학기 단원평가 분석기 목록</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding: 30px; background-color: #f8f9fa; }
        h1 { color: #2c3e50; margin-bottom: 40px; }
        
        .main-container {
            display: flex;
            justify-content: center;
            gap: 40px; 
            max-width: 800px;
            margin: 0 auto;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 15px; 
            flex: 1;
        }

        .column-title {
            font-size: 20px;
            font-weight: bold;
            padding-bottom: 10px;
            border-bottom: 3px solid #ccc;
            margin-bottom: 10px;
        }

        .menu-link {
            text-decoration: none;
            padding: 20px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .menu-link:hover { transform: scale(1.05); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }

        .korean-title { color: #27ae60; border-bottom-color: #27ae60; }
        /* 1단원(초록), 2단원(오렌지) 색상 다르게 지정 */
        .korean-btn-1 { background-color: #2ecc71; }
        .korean-btn-2 { background-color: #e67e22; }
        
        .math-title { color: #3498db; border-bottom-color: #3498db; }
        .math-btn { background-color: #3498db; }

        @media (max-width: 600px) {
            .main-container { flex-direction: column; align-items: center; }
            .column { width: 100%; max-width: 300px; }
        }
    </style>
</head>
<body>

    <h1>📋 2학년 1학기 평가 분석기</h1>

    <div class="main-container">
        <div class="column">
            <div class="column-title korean-title">📖 국어</div>
            <a href="./korean2-1-1/" class="menu-link korean-btn-1">1단원 (만나서 반가워요!)</a>
            <a href="./korean2-1-2/" class="menu-link korean-btn-2">2단원 (말의 재미가 솔솔)</a>
        </div>

        <div class="column">
            <div class="column-title math-title">🔢 수학</div>
            <a href="./math2-1-1/" class="menu-link math-btn">1단원 (세 자리 수)</a>
        </div>
    </div>

</body>
</html>
